<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0A0A0B" />
  <title>FinanceOS</title>
  <meta name="description" content="Sistema operativo financiero personal de Alejo." />

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinanceOS" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />

  <!-- Tipografía Inter — identidad del Design System (TD-06) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">

  <link rel="stylesheet" href="src/styles/tokens.css" />
  <link rel="stylesheet" href="src/styles/themes.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/layout.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
</head>
<body>
  <noscript>FinanceOS requiere JavaScript habilitado.</noscript>

  <a class="skip-link" href="#view">Saltar al contenido</a>

  <!-- El shell de la aplicación se monta aquí -->
  <div id="app" class="app-root" aria-busy="true"></div>

  <!-- Contenedor de toasts -->
  <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="false"></div>

  <!-- Google Identity Services — dispara 'gsi:ready' cuando carga (TD-09) -->
  <script src="https://accounts.google.com/gsi/client" async defer
          onload="document.dispatchEvent(new Event('gsi:ready'))"></script>

  <script type="module" src="src/core/app.js"></script>
</body>
</html>
